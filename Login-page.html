<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="orange_food_fruit_icon_182571.svg" type="image/x-icon">
    <title>Login Page</title>
</head>
<body>
   <div class="main-login">
    <div class="left-login">
        <h1><center>CITRICALS<br> Seu site de reviews de filmes e séries!</center></h1>
        <img src="login-page-image.svg" class="left-login-image" alt="animação da página de login">
    </div>
    <div class="right-login"></div>
    <div class="card-login">
       <img src="orange_food_fruit_icon_182571.svg" alt="icon do site">
        <div class="textfield">
            <label for="usuario">Nome de Usuário</label>
            <input type="text" name="usuario" placeholder="Digite seu nome aqui" minlength="5" required>
        </div>
        <div class="textfield">
            <label for="senha">Senha</label>
            <input type="password" name="senha" placeholder="Mínimo 8 dígitos" minlength="8" required>
        </div>
        <button class="btn-login">Login</button>
        <div class="submit">
            <p class="sign">Ainda não se cadastrou? <a href="sign-here.html" class="sign-here">Clique aqui!</a></p>
        </div>
    </div>
   </div>
</body>
</html>
